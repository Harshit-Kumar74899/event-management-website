<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<style>
body{
    margin:0;
    font-family: "Segoe UI", Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    /* Soft premium gradient */
    background: linear-gradient(135deg, #f5efe6, #e8d8c3);
}

/* Card */
.container{
    background:#ffffff;
    padding:35px;
    border-radius:16px;
    width:350px;
    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

h2{
    margin-bottom:20px;
    color:#6b4f3b;
}

/* Inputs */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #d6c2a8;
    font-size:14px;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#b68d40;
    box-shadow:0 0 6px rgba(182,141,64,0.3);
}

/* Buttons */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;

    background: linear-gradient(135deg, #b68d40, #8b5e2e);
    color:white;
    transition:0.3s;
}

button:hover{
    transform:translateY(-1px);
    box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* Message */
.msg{
    margin-top:10px;
    font-size:14px;
    color:#555;
}
</style>

</head>

<body>

<div class="container">

<h2>Forgot Password</h2>

<!-- STEP 1 -->
<form id="emailForm">
  <input type="email" id="email" placeholder="Enter your email" required>
  <button type="submit">Check Email</button>
</form>

<!-- STEP 2 -->
<form id="resetForm" style="display:none;">
  <input type="password" id="newPassword" placeholder="New Password" required>
  <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
  <button type="submit">Reset Password</button>
</form>

<div class="msg" id="message"></div>

</div>

<script>
let userEmail = "";

document.getElementById("emailForm").onsubmit = async function(e){
  e.preventDefault();
  userEmail = document.getElementById("email").value;

  let res = await fetch("/check-email", {
    method: "POST",
    body: userEmail
  });

  let result = await res.text();

  if(result === "EXISTS"){
    document.getElementById("message").innerText = "Email found ✔";
    document.getElementById("emailForm").style.display = "none";
    document.getElementById("resetForm").style.display = "block";
  } else {
    document.getElementById("message").innerText = "Email not found ❌";
  }
};

document.getElementById("resetForm").onsubmit = async function(e){
  e.preventDefault();

  let newPass = document.getElementById("newPassword").value;
  let confirmPass = document.getElementById("confirmPassword").value;

  if(newPass !== confirmPass){
    document.getElementById("message").innerText = "Passwords do not match ❌";
    return;
  }

  let res = await fetch("/reset-password", {
    method: "POST",
    body: userEmail + "," + newPass
  });

  let result = await res.text();

  if(result === "SUCCESS"){
    alert("Password Updated ✅");
    window.location.href = "login.html";
  } else {
    document.getElementById("message").innerText = "Error ❌";
  }
};
</script>

</body>
</html>
