<!DOCTYPE html>
<html>
<head>
<title>Shubh Mangalamh Events</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    height:100vh;
    overflow:hidden;
}

/* ===== BACKGROUND SLIDER ===== */
.bg-slider{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

.bg-slider img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    animation: fadeSlide 16s infinite;
}

.bg-slider img:nth-child(1){ animation-delay: 0s; }
.bg-slider img:nth-child(2){ animation-delay: 4s; }
.bg-slider img:nth-child(3){ animation-delay: 8s; }
.bg-slider img:nth-child(4){ animation-delay: 12s; }

@keyframes fadeSlide{
    0%{ opacity:0; }
    10%{ opacity:1; }
    35%{ opacity:1; }
    45%{ opacity:0; }
    100%{ opacity:0; }
}

/* ===== OVERLAY ===== */
.overlay{
    height:100vh;
    background:rgba(0,0,0,0.55);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
}

/* ===== LOGIN BUTTON ===== */
.top-right{
    position:absolute;
    top:20px;
    right:30px;
}

.login-btn{
    padding:10px 24px;
    background: linear-gradient(135deg,#ffd700,#ffb300);
    color:#4e342e;
    border-radius:12px;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 6px 18px rgba(255,215,0,0.5);
    transition:0.3s;
}

.login-btn:hover{
    background: linear-gradient(135deg,#ffca28,#ffa000);
    transform:scale(1.05);
    box-shadow:0 8px 22px rgba(255,215,0,0.7);
}

/* ===== LOGO ===== */
.index-logo{
    height: clamp(200px, 60vh, 320px);
    object-fit:contain;
    filter:
        drop-shadow(0 6px 18px rgba(255, 193, 7, 0.6))
        drop-shadow(0 0 30px rgba(255, 183, 3, 0.5));
}

/* ===== TEXT ===== */
.welcome{
    font-size:50px;
    margin-top:25px;
    letter-spacing:1px;

    background: linear-gradient(135deg,#ffd700,#ffb300,#ff8f00);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    font-weight:700;
}

.tagline{
    font-size:30px;
    margin-top:10px;
    color:#cfa465;
    font-weight:500;
}

/* ===== DIVIDER ===== */
.divider{
    width:120px;
    height:2px;
    margin:15px auto;
    background:linear-gradient(to right, transparent, #d4af37, transparent);
}

/* ===== BOTTOM TEXT ===== */
.bottom-text{
    position:absolute;
    bottom:20px;
    color:#ffecb3;
    font-size:14px;
}

/* ===== GLOW EFFECT ===== */
.glow{
    position:absolute;
    width:300px;
    height:300px;
    background:radial-gradient(circle, rgba(255,215,0,0.2), transparent);
    border-radius:50%;
    animation: float 6s ease-in-out infinite;
}

.glow:nth-child(1){
    top:10%;
    left:10%;
}
.glow:nth-child(2){
    bottom:10%;
    right:10%;
    animation-delay:2s;
}

@keyframes float{
    0%{ transform:translateY(0); }
    50%{ transform:translateY(-20px); }
    100%{ transform:translateY(0); }
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg-slider">
    <img src="images/f1.jpeg">
    <img src="images/f2.jpeg">
    <img src="images/f3.jpeg">
    <img src="images/f4.jpeg">
</div>

<div class="overlay">

    <!-- GLOW -->
    <div class="glow"></div>
    <div class="glow"></div>

    <!-- LOGIN -->
    <div class="top-right">
        <a href="/login" class="login-btn">Login</a>
    </div>

    <!-- LOGO -->
    <img src="images/logo1.png" class="index-logo" alt="Logo">

    <!-- TEXT -->
    <div class="welcome">Welcome to Shubh Mangalamh Events</div>

    <div class="divider"></div>

    <div class="tagline">Crafting Royal & Memorable Celebrations ✨</div>

    <!-- FOOT -->
    <div class="bottom-text">Make your special day unforgettable</div>

</div>

</body>
</html>
